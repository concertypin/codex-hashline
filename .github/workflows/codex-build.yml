# Build workflow for concertypin/codex-hashline fork.
# Cross-compiles Codex CLI for Windows (GNU ABI) on push to main or manual dispatch.

name: codex-build

on:
  push:
    branches: [main, feat/*]
  workflow_dispatch:

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    defaults:
      run:
        working-directory: codex-rs
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-pc-windows-gnu
            binaries: "codex codex-responses-api-proxy"
            sys-deps: gcc-mingw-w64-x86-64 pkg-config libcap-dev

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          # shellcheck disable=SC2086
          sudo apt-get install -y -qq --no-install-recommends ${{ matrix.sys-deps }}

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          IFS=' ' read -ra bins <<< "${{ matrix.binaries }}"
          build_args=()
          for binary in "${bins[@]}"; do
            build_args+=(--bin "$binary")
          done
          cargo build --target "${{ matrix.target }}" --release "${build_args[@]}"

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codex-${{ matrix.target }}
          path: |
            codex-rs/target/${{ matrix.target }}/release/codex.exe
            codex-rs/target/${{ matrix.target }}/release/codex-responses-api-proxy.exe
          if-no-files-found: error

      - name: Build summary
        shell: bash
        run: |
          echo "## ✅ Build complete: \`${{ matrix.target }}\`" >> "$GITHUB_STEP_SUMMARY"
          IFS=' ' read -ra bins <<< "${{ matrix.binaries }}"
          for binary in "${bins[@]}"; do
            path="codex-rs/target/${{ matrix.target }}/release/${binary}.exe"
            if [ -f "$path" ]; then
              size=$(stat --format=%s "$path")
              echo "- \`${binary}.exe\`: $(numfmt --to=iec $size)" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
