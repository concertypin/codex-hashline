# Build workflow for concertypin/codex-hashline fork.
# Builds Codex CLI for Linux and Windows via GitHub hosted runners.
# Triggered on push to main/feat branches or manual dispatch.

name: codex-build

on:
  push:
    branches: [main, feat/*]
  workflow_dispatch:

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            pkg-config libcap-dev

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          cargo build --target x86_64-unknown-linux-gnu --release \
            --bin codex --bin codex-responses-api-proxy

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codex-linux-x86_64
          path: |
            codex-rs/target/x86_64-unknown-linux-gnu/release/codex
            codex-rs/target/x86_64-unknown-linux-gnu/release/codex-responses-api-proxy
          if-no-files-found: error

      - name: Build summary
        shell: bash
        run: |
          echo "## Linux build complete" >> "$GITHUB_STEP_SUMMARY"
          for bin in codex codex-responses-api-proxy; do
            path="codex-rs/target/x86_64-unknown-linux-gnu/release/${bin}"
            if [ -f "$path" ]; then
              size=$(stat --format=%s "$path")
              echo "- \`${bin}\`: $(numfmt --to=iec $size)" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          cargo build --target x86_64-pc-windows-msvc --release \
            --bin codex --bin codex-responses-api-proxy

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codex-windows-x86_64-msvc
          path: |
            codex-rs/target/x86_64-pc-windows-msvc/release/codex.exe
            codex-rs/target/x86_64-pc-windows-msvc/release/codex-responses-api-proxy.exe
          if-no-files-found: error

      - name: Build summary
        shell: bash
        run: |
          echo "## Windows build complete" >> "$GITHUB_STEP_SUMMARY"
          for bin in codex codex-responses-api-proxy; do
            path="codex-rs/target/x86_64-pc-windows-msvc/release/${bin}.exe"
            if [ -f "$path" ]; then
              size=$(stat --format=%s "$path")
              echo "- \`${bin}.exe\`: $(numfmt --to=iec $size)" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
