# Build workflow for concertypin/codex-hashline fork.
# Builds Codex CLI for Linux on push to main or manual dispatch.
# Windows build is unavailable on fork (V8 prebuilt not available for Windows targets).

name: codex-build

on:
  push:
    branches: [main, feat/*]
  workflow_dispatch:

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            pkg-config libcap-dev

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          cargo build --target x86_64-unknown-linux-gnu --release \
            --bin codex --bin codex-responses-api-proxy

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codex-linux-x86_64
          path: |
            codex-rs/target/x86_64-unknown-linux-gnu/release/codex
            codex-rs/target/x86_64-unknown-linux-gnu/release/codex-responses-api-proxy
          if-no-files-found: error

      - name: Build summary
        shell: bash
        run: |
          echo "## Linux build complete" >> "$GITHUB_STEP_SUMMARY"
          for bin in codex codex-responses-api-proxy; do
            path="codex-rs/target/x86_64-unknown-linux-gnu/release/${bin}"
            if [ -f "$path" ]; then
              size=$(stat --format=%s "$path")
              echo "- \`${bin}\`: $(numfmt --to=iec $size)" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
